<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">总部会拥有什么功能</title>
  <desc id="desc">客户会得到的功能总览。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8eedf"/>
      <stop offset="0.58" stop-color="#e7d4b5"/>
      <stop offset="1" stop-color="#aeb790"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">04 / FUNCTION MAP</text>
  <text x="88" y="170" class="serif ink" font-size="58" font-weight="760">
    <tspan x="88" dy="0">总部最终会拥有的，</tspan>
    <tspan x="88" dy="66">不是抽象 AI，而是可执行功能</tspan>
  </text>
  <text x="88" y="274" class="sans muted" font-size="28" font-weight="700">客户关心的是“能做什么”，不是内部如何命名模块。</text>
  <g class="sans">
    <rect x="88" y="324" width="442" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="578" y="324" width="442" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="1068" y="324" width="444" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="88" y="490" width="442" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="578" y="490" width="442" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="1068" y="490" width="444" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="333" y="656" width="934" height="136" rx="24" fill="#fff8ec" fill-opacity="0.84"/>
    <text x="124" y="376" class="accent" font-size="24" font-weight="900">01</text>
    <text x="124" y="416" class="ink" font-size="32" font-weight="900">任务录入</text>
    <text x="124" y="446" class="muted" font-size="22">统一录入区域、平台、主题、目标。</text>
    <text x="614" y="376" class="accent" font-size="24" font-weight="900">02</text>
    <text x="614" y="416" class="ink" font-size="32" font-weight="900">爆款选题</text>
    <text x="614" y="446" class="muted" font-size="22">优先产出视频号、抖音高潜题。</text>
    <text x="1104" y="376" class="accent" font-size="24" font-weight="900">03</text>
    <text x="1104" y="416" class="ink" font-size="32" font-weight="900">内容生成</text>
    <text x="1104" y="446" class="muted" font-size="22">生成脚本、图文、公众号草稿。</text>
    <text x="124" y="542" class="accent" font-size="24" font-weight="900">04</text>
    <text x="124" y="582" class="ink" font-size="32" font-weight="900">风险审核</text>
    <text x="124" y="612" class="muted" font-size="22">给出通过、修改、拦截结果。</text>
    <text x="614" y="542" class="accent" font-size="24" font-weight="900">05</text>
    <text x="614" y="582" class="ink" font-size="32" font-weight="900">视频制作</text>
    <text x="614" y="612" class="muted" font-size="22">短视频提示词、生成、接口对接。</text>
    <text x="1104" y="542" class="accent" font-size="24" font-weight="900">06</text>
    <text x="1104" y="582" class="ink" font-size="32" font-weight="900">发布管理</text>
    <text x="1104" y="612" class="muted" font-size="22">总部管账号、节奏、设备、状态。</text>
    <text x="369" y="708" class="accent" font-size="24" font-weight="900">07</text>
    <text x="369" y="748" class="ink" font-size="32" font-weight="900">结果复盘</text>
    <text x="369" y="778" class="muted" font-size="22">回收曝光、互动、线索和结论，反哺下一轮。</text>
  </g>
  <rect x="88" y="808" width="1424" height="44" rx="20" fill="#312b22"/>
  <text x="800" y="838" text-anchor="middle" class="sans" fill="#fff8ec" font-size="23" font-weight="900">下面四页分别展开：任务与选题、内容与审核、视频制作、发布与复盘。</text>
</svg>
