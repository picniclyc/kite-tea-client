<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">为什么不能继续靠零散内容运作</title>
  <desc id="desc">说明继续靠零散内容运作的风险。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf0e2"/>
      <stop offset="0.58" stop-color="#e6d4b7"/>
      <stop offset="1" stop-color="#afb992"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">03 / WHY NOT MANUAL</text>
  <text x="88" y="176" class="serif ink" font-size="72" font-weight="760">为什么不能继续靠“零散选题 + 临时执行”</text>
  <text x="88" y="242" class="sans muted" font-size="32" font-weight="700">当内容生产仍然依赖零散判断，规模越大，混乱和风险只会越大。</text>
  <rect x="88" y="318" width="660" height="402" rx="30" fill="#fff8ec" fill-opacity="0.82"/>
  <rect x="852" y="318" width="660" height="402" rx="30" fill="#312b22"/>
  <text x="132" y="388" class="sans accent" font-size="28" font-weight="900">继续沿用旧方式，会发生什么</text>
  <text x="132" y="466" class="sans ink" font-size="30" font-weight="900">1. 每一轮都像重新开始</text>
  <text x="132" y="526" class="sans ink" font-size="30" font-weight="900">2. 经验沉淀在个人，不沉淀在组织</text>
  <text x="132" y="586" class="sans ink" font-size="30" font-weight="900">3. 经销商越多，协同复杂度越高</text>
  <text x="132" y="646" class="sans ink" font-size="30" font-weight="900">4. 内容越多，平台与品牌风险越大</text>
  <text x="896" y="388" class="sans cream" font-size="28" font-weight="900">换成系统化链路后，会得到什么</text>
  <text x="896" y="466" class="sans cream" font-size="30" font-weight="900">统一任务标准</text>
  <text x="896" y="526" class="sans cream" font-size="30" font-weight="900">统一审核边界</text>
  <text x="896" y="586" class="sans cream" font-size="30" font-weight="900">统一总部代发</text>
  <text x="896" y="646" class="sans cream" font-size="30" font-weight="900">统一结果回收与复盘</text>
  <rect x="88" y="760" width="1424" height="76" rx="22" fill="#fff8ec" fill-opacity="0.9"/>
  <text x="136" y="808" class="sans ink" font-size="30" font-weight="900">核心判断：客户现在需要的不是多一次内容制作，而是一条可以长期复制的总部增长链路。</text>
</svg>
