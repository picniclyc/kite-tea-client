<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">项目定义</title>
  <desc id="desc">Kite 茶叶客户区域内容增长系统项目定义。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8eedf"/>
      <stop offset="0.58" stop-color="#e7d5b4"/>
      <stop offset="1" stop-color="#adb68d"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">01 / PROJECT DEFINITION</text>
  <text x="88" y="170" class="serif ink" font-size="64" font-weight="760">
    <tspan x="88" dy="0">Kite 茶叶客户</tspan>
    <tspan x="88" dy="68">区域内容增长系统</tspan>
  </text>
  <text x="88" y="286" class="sans muted" font-size="30" font-weight="700">
    <tspan x="88" dy="0">不是一次性内容服务，而是一套由总部统一驱动、</tspan>
    <tspan x="88" dy="40">可以持续复制的内容增长能力。</tspan>
  </text>
  <rect x="88" y="356" width="950" height="304" rx="30" fill="#fff8ec" fill-opacity="0.76"/>
  <text x="136" y="416" class="sans ink" font-size="34" font-weight="900">这次项目要解决的，不是“多做几条内容”</text>
  <text x="136" y="470" class="sans muted" font-size="27">
    <tspan x="136" dy="0">而是让总部拥有一条可以稳定运行的内容工作链路：</tspan>
    <tspan x="136" dy="50">任务输入 → 爆款选题 → 内容生成 → 风险审核 → 总部代发 → 结果复盘</tspan>
    <tspan x="136" dy="54">这条链路一旦跑通，后面扩区域、扩账号、扩平台才有基础。</tspan>
  </text>
  <rect x="1086" y="356" width="426" height="304" rx="30" fill="#312b22"/>
  <text x="1128" y="414" class="sans cream" font-size="26" font-weight="900">客户最终买到什么</text>
  <text x="1128" y="482" class="serif cream" font-size="50" font-weight="800">不是工具</text>
  <text x="1128" y="538" class="serif cream" font-size="50" font-weight="800">是系统</text>
  <text x="1128" y="612" class="sans cream" font-size="22">
    <tspan x="1128" dy="0">能组织任务</tspan>
    <tspan x="1128" dy="36">能沉淀内容资产</tspan>
    <tspan x="1128" dy="36">能持续优化下一轮</tspan>
  </text>
  <rect x="88" y="716" width="1424" height="96" rx="26" fill="#fff8ec" fill-opacity="0.9"/>
  <text x="136" y="774" class="sans ink" font-size="30" font-weight="900">一句话定义：先把总部内容增长主链路做对，再把它做大。</text>
</svg>
