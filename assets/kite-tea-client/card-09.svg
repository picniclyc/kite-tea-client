<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">系统如何承载</title>
  <desc id="desc">系统承载方式说明。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9efde"/>
      <stop offset="0.58" stop-color="#e9d5b5"/>
      <stop offset="1" stop-color="#acb58d"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">09 / SYSTEM CARRIER</text>
  <text x="88" y="176" class="serif ink" font-size="72" font-weight="760">这套系统如何承载</text>
  <text x="88" y="242" class="sans muted" font-size="32" font-weight="700">客户看到的是“功能链路”，底层由 Kite 工作流和飞书协同台账承载。</text>
  <rect x="120" y="322" width="1360" height="148" rx="30" fill="#312b22"/>
  <text x="190" y="392" class="serif cream" font-size="56" font-weight="800">Kite</text>
  <text x="390" y="392" class="sans cream" font-size="30" font-weight="900">负责把任务输入、选题、内容、审核、发布、复盘串成一条工作流</text>
  <rect x="120" y="506" width="1360" height="148" rx="30" fill="#fff8ec" fill-opacity="0.86"/>
  <text x="190" y="576" class="serif ink" font-size="56" font-weight="800">飞书多维表格</text>
  <text x="500" y="576" class="sans muted" font-size="30" font-weight="900">负责承接账号、任务、内容资产、发布记录、结果复盘和协同台账</text>
  <rect x="120" y="690" width="1360" height="122" rx="30" fill="#fff8ec" fill-opacity="0.9"/>
  <text x="190" y="756" class="sans ink" font-size="30" font-weight="900">客户侧理解方式很简单：前台看到的是明确功能，后台是一套可以重复执行的总部内容系统。</text>
</svg>
