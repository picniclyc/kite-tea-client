<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">功能三：视频制作</title>
  <desc id="desc">Seedance 短视频制作能力说明。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8efdf"/>
      <stop offset="0.58" stop-color="#e6d4b7"/>
      <stop offset="1" stop-color="#afba92"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">07 / FUNCTION DETAIL C</text>
  <text x="88" y="176" class="serif ink" font-size="70" font-weight="760">功能三：把短视频真正做出来</text>
  <g class="sans">
    <rect x="88" y="258" width="676" height="498" rx="30" fill="#312b22"/>
    <rect x="836" y="258" width="676" height="498" rx="30" fill="#fff8ec" fill-opacity="0.82"/>
    <text x="132" y="326" class="accent" font-size="28" font-weight="900">视频制作能力</text>
    <text x="132" y="382" class="cream" font-size="30" font-weight="900">从脚本到短视频，不停留在文案层</text>
    <text x="132" y="444" class="cream" font-size="26">1. 把脚本拆成镜头、画面和运镜指令</text>
    <text x="132" y="494" class="cream" font-size="26">2. 编写 Seedance 所需的提示词</text>
    <text x="132" y="544" class="cream" font-size="26">3. 生成适合视频号、抖音的短视频素材</text>
    <text x="132" y="594" class="cream" font-size="26">4. 支持多轮修改，优化节奏、镜头和表达</text>
    <text x="132" y="644" class="cream" font-size="26">5. 把视频成品回收进内容资产库</text>
    <text x="880" y="326" class="accent" font-size="28" font-weight="900">对接方式</text>
    <text x="880" y="382" class="ink" font-size="30" font-weight="900">不仅是写提示词，还包括产出与对接</text>
    <text x="880" y="444" class="muted" font-size="26">1. 根据题目自动整理视频生成输入</text>
    <text x="880" y="494" class="muted" font-size="26">2. 对接 Seedance 或对应视频生成接口</text>
    <text x="880" y="544" class="muted" font-size="26">3. 管理生成状态、版本与结果回收</text>
    <text x="880" y="594" class="muted" font-size="26">4. 输出可用于发布或二次剪辑的视频资产</text>
    <text x="880" y="644" class="muted" font-size="26">5. 让“爆款选题”真正变成“可发视频”</text>
  </g>
</svg>
