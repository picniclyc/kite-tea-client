<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">功能二：内容与审核</title>
  <desc id="desc">内容生产与风险审核能力说明。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faefe0"/>
      <stop offset="0.58" stop-color="#e7d6ba"/>
      <stop offset="1" stop-color="#b2bc95"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">06 / FUNCTION DETAIL B</text>
  <text x="88" y="176" class="serif ink" font-size="70" font-weight="760">功能二：把内容做出来，把风险控住</text>
  <g class="sans">
    <rect x="88" y="258" width="676" height="498" rx="30" fill="#fff8ec" fill-opacity="0.82"/>
    <rect x="836" y="258" width="676" height="498" rx="30" fill="#fff8ec" fill-opacity="0.82"/>
    <text x="132" y="326" class="accent" font-size="28" font-weight="900">内容生产</text>
    <text x="132" y="382" class="ink" font-size="30" font-weight="900">围绕同一题目，一次出多种内容形态</text>
    <text x="132" y="444" class="muted" font-size="26">1. 视频脚本：开头钩子、主体结构、收口口播</text>
    <text x="132" y="494" class="muted" font-size="26">2. 小红书图文：标题、结构、图文要点</text>
    <text x="132" y="544" class="muted" font-size="26">3. 公众号草稿：长图文内容延展和沉淀</text>
    <text x="132" y="594" class="muted" font-size="26">4. 按不同区域做必要的表达调整</text>
    <text x="132" y="644" class="muted" font-size="26">5. 保留内容资产，供后续复用和二次改写</text>
    <text x="880" y="326" class="accent" font-size="28" font-weight="900">风险审核</text>
    <text x="880" y="382" class="ink" font-size="30" font-weight="900">每条内容在发布前，先过三道检查</text>
    <text x="880" y="444" class="muted" font-size="26">1. 平台风险：是否触碰平台敏感表达</text>
    <text x="880" y="494" class="muted" font-size="26">2. 品牌风险：是否偏离品牌调性与红线</text>
    <text x="880" y="544" class="muted" font-size="26">3. 表达风险：是否夸大、失真、容易误解</text>
    <text x="880" y="606" class="ink" font-size="28" font-weight="900">审核输出只有三种结果</text>
    <text x="880" y="658" class="muted" font-size="26">通过 / 修改 / 拦截</text>
  </g>
</svg>
