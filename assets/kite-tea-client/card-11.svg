<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Version 1：国内试点版</title>
  <desc id="desc">Version 1 国内试点版说明。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9efde"/>
      <stop offset="0.58" stop-color="#e8d6b8"/>
      <stop offset="1" stop-color="#afba92"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">11 / VERSION 1</text>
  <text x="88" y="176" class="serif ink" font-size="72" font-weight="760">Version 1：先把国内试点 4 周链路跑通</text>
  <text x="88" y="242" class="sans muted" font-size="32" font-weight="700">首期成功标准不是“系统很大”，而是“4 周内这条链路跑通，内容能稳定产出并能复盘”。</text>
  <g class="sans">
    <rect x="88" y="316" width="680" height="422" rx="30" fill="#fff8ec" fill-opacity="0.84"/>
    <rect x="832" y="316" width="680" height="422" rx="30" fill="#312b22"/>
    <text x="132" y="384" class="accent" font-size="28" font-weight="900">首期范围</text>
    <text x="132" y="442" class="ink" font-size="30" font-weight="900">平台优先级</text>
    <text x="132" y="492" class="muted" font-size="26">视频主平台：视频号、抖音</text>
    <text x="132" y="536" class="muted" font-size="26">图文主平台：小红书</text>
    <text x="132" y="580" class="muted" font-size="26">内容延展：公众号草稿</text>
    <text x="132" y="648" class="ink" font-size="30" font-weight="900">首期不做</text>
    <text x="132" y="698" class="muted" font-size="26">跨境链路 / 经销商自助端 / 复杂群控系统</text>
    <text x="876" y="384" class="accent" font-size="28" font-weight="900">首期验收标准</text>
    <text x="876" y="442" class="cream" font-size="26">1. 区域任务能稳定录入</text>
    <text x="876" y="486" class="cream" font-size="26">2. 能持续产出高潜选题</text>
    <text x="876" y="530" class="cream" font-size="26">3. 能生成视频脚本与图文内容</text>
    <text x="876" y="574" class="cream" font-size="26">4. 内容能在发布前完成审核</text>
    <text x="876" y="618" class="cream" font-size="26">5. 总部能按节奏代发</text>
    <text x="876" y="662" class="cream" font-size="26">6. 结果能被记录和复盘</text>
  </g>
</svg>
