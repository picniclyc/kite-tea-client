<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">为什么必须分阶段推进</title>
  <desc id="desc">说明为什么不能一步到位。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9efdf"/>
      <stop offset="0.58" stop-color="#e8d6b8"/>
      <stop offset="1" stop-color="#b0ba93"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .serif{font-family:"Noto Serif SC","Songti SC",serif}
      .ink{fill:#29231a}.muted{fill:#6d604d}.accent{fill:#ba6820}.dark{fill:#312b22}.cream{fill:#fff8ec}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#fff8ec" stroke-width="2"/>
  <text x="88" y="94" class="sans accent" font-size="24" font-weight="900" letter-spacing="5">10 / PHASED APPROACH</text>
  <text x="88" y="176" class="serif ink" font-size="72" font-weight="760">为什么必须分阶段推进，而不是一步到位</text>
  <g class="sans">
    <rect x="88" y="266" width="1424" height="156" rx="28" fill="#312b22"/>
    <rect x="88" y="460" width="1424" height="156" rx="28" fill="#fff8ec" fill-opacity="0.88"/>
    <rect x="88" y="654" width="1424" height="156" rx="28" fill="#fff8ec" fill-opacity="0.78"/>
    <text x="132" y="326" class="accent" font-size="24" font-weight="900">原因 1</text>
    <text x="132" y="374" class="cream" font-size="36" font-weight="900">主链路必须先跑通</text>
    <text x="132" y="408" class="cream" font-size="25">如果选题、内容、审核、代发、复盘都还没跑通，后面扩区域只会放大错误。</text>
    <text x="132" y="520" class="accent" font-size="24" font-weight="900">原因 2</text>
    <text x="132" y="568" class="ink" font-size="36" font-weight="900">真实试点才能修正逻辑</text>
    <text x="132" y="602" class="muted" font-size="25">平台偏好、地区差异、内容有效性和审核边界，都需要在真实运行里不断校正。</text>
    <text x="132" y="714" class="accent" font-size="24" font-weight="900">原因 3</text>
    <text x="132" y="762" class="ink" font-size="36" font-weight="900">阶段推进更符合投入产出</text>
    <text x="132" y="796" class="muted" font-size="25">客户能在每个阶段清楚看到成果、交付和下一步，而不是一开始就为全部未来能力买单。</text>
  </g>
</svg>
